[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — also enforced via public/_redirects, kept here too since
# netlify.toml redirects take precedence and are easier to spot in one place.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Reasonable default security headers for a salon-staff-facing app.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Long-cache hashed build assets; never cache index.html so deploys go live
# immediately instead of being stuck behind a stale cached shell.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
